name: Draw Keymap
on:
  workflow_dispatch: # 允许手动触发
  push:
    paths:
      - "config/*.keymap"
      - "keymap_drawer.config.yaml"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Make output folder
        run: mkdir -p img

      # 记得将这里的 config/charybdis.keymap 改为你实际的文件名
      - name: Draw keymap SVG
        run: |
          keymap parse -c keymap_drawer.config.yaml -z config/charybdis.keymap > img/keymap.yaml
          keymap draw -c keymap_drawer.config.yaml img/keymap.yaml > img/keymap.svg

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add img/keymap.svg
          git diff-index --quiet HEAD || git commit -m "bot: update keymap layout drawing"
          git push
