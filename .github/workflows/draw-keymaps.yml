name: Draw ZMK keymaps

on:
  workflow_dispatch:
  push:
    paths:
      - "config/*.keymap"
      - "config/*.dtsi"
      - "keymap_drawer.config.yaml"

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw keymaps
        run: |
          mkdir -p keymap-drawer
          keymap parse config/charybdis.keymap -c 10 -z > keymap-drawer/charybdis.yaml
          keymap draw keymap-drawer/charybdis.yaml -c keymap_drawer.config.yaml > keymap-drawer/charybdis.svg

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: "keymap-drawer/*.svg keymap-drawer/*.yaml"
          commit_message: "keymap-drawer render"
