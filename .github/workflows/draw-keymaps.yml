name: Draw Keymap
on:
  workflow_dispatch: # 允许手动触发
  push:
    paths:
      - "config/*.keymap"
      - "keymap_drawer.config.yaml"

jobs:
  draw:
    runs-level: write
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Make output folder
        run: mkdir -p img

      # 核心绘制步骤：注意修改为你实际的 .keymap 文件路径
      # Charybdis 布局通常可以使用 qmk 对应的 layout 或者是标准的 matrix
      - name: Draw keymap SVG
        run: |
          keymap parse -c keymap_drawer.config.yaml -z config/charybdis.keymap > img/keymap.yaml
          keymap draw -c keymap_drawer.config.yaml img/keymap.yaml > img/keymap.svg

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add img/keymap.svg
          git diff-index --quiet HEAD || git commit -m "bot: update keymap layout drawing"
          git push
