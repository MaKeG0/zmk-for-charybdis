# keymap_drawer.config.yaml
# 为 Charybdis 4x6 分体键盘生成美观的键位图
draw_config:
  # 布局定义
  layout:
    ortho_layout:
      split: true
      rows: 4
      columns: 6
      thumbs: 5

  # 基础显示设置
  append_colon_to_layer_header: false
  draw_key_sides: true

  # 自定义 CSS 样式 (字体、颜色、布局)
  svg_extra_style: |
    svg.keymap {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: bold;
    }
    text.label {
      stroke: #dfdfde;
      stroke-width: 12;
      stroke-linejoin: round;
    }
    rect.combo, rect.combo-separate {
      opacity: 0.95;
      stroke: #c9cccf;
      stroke-width: 0.5;
      fill: #d7eaed;
    }
    path.combo {
      stroke-dasharray: 4, 4;
      stroke-opacity: 0.3;
    }
    rect.held, rect.combo.held {
      fill: #ebdada;
    }
    /* 以下为参考库的高级样式，用于美化层状态显示 */
    .trans.tap, .ghost.tap {
      opacity: 0.5;
    }
    .shifted {
      translate: -9px 3px;
      opacity: 0.3;
    }
    .toggle.shifted {
      translate: -12px 17px;
      opacity: 1.0;
    }
    .toggle.hold {
      translate: 12px -25px;
    }
    .text_with_symbol.tap {
      translate: -1px 1px;
    }
    .text_with_symbol.shifted {
      translate: 8px 13px;
      font-size: 8px;
      opacity: 1.0;
    }
    .combo.text_with_symbol.tap {
      translate: -1px 1px;
    }
    .combo.text_with_symbol.shifted {
      translate: 7px 5px;
      font-size: 8px;
      opacity: 1.0;
    }

  # 解析配置
  parse_config:
    preprocess: true  # 开启预处理，这是美化的关键开关！
    skip_binding_parsing: false
    
    # 自定义行为的显示方式
    raw_binding_map:
      "&none":
        tap: $$mdi:minus-circle-outline$$
        type: none
      "&bt BT_SEL 0":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 1
      "&bt BT_SEL 1":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 2
      "&bt BT_SEL 2":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 3
      "&bt BT_SEL 3":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 4
      "&bt BT_SEL 4":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 5
      "&bt BT_SEL 5":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 6
      "&mkp LCLK":
        tap: $$mdi:mouse-left-click$$
        hold: "left"
      "&mkp MCLK":
        tap: $$mdi:mouse$$
        hold: "middle"
      "&mkp RCLK":
        tap: $$mdi:mouse-right-click$$
        hold: "right"
      "&bootloader":
        tap: $$mdi:gesture-tap-hold$$

    # 自定义图例
    sticky_label: $$mdi:gesture-tap-hold$$
    toggle_label: toggle
    tap_toggle_label: tap-toggle
    trans_legend:
      tap: $$mdi:transfer$$
      type: trans

    # 标记所有层切换键 (如 &mo, &lt)
    mark_alternate_layer_activators: true

    # 组合键修饰符的显示方式
    modifier_fn_map:
      left_ctrl: Ctl
      right_ctrl: Ctl
      left_shift: $$mdi:apple-keyboard-shift$$
      right_shift: $$mdi:apple-keyboard-shift$$
      left_alt: Alt
      right_alt: AltGr
      left_gui: Gui
      right_gui: Gui
      keycode_combiner: '{mods}+{key}'
      mod_combiner: '{mod_1}+{mod_2}'

    # 将 ZMK 键码转换为美观的显示文本或图标
    zmk_keycode_map:
      # 常用符号
      EXCLAMATION: '!'
      AT_SIGN: '@'
      HASH: '#'
      DOLLAR: $
      PERCENT: '%'
      CARET: ^
      AMPERSAND: '&'
      ASTERISK: '*'
      LEFT_PARENTHESIS: (
      RIGHT_PARENTHESIS: )
      MINUS: '-'
      EQUAL: '='
      UNDERSCORE: _
      GRAVE: '`'
      TILDE: '~'
      PIPE: '|'
      SLASH: /
      BACKSLASH: \
      QUESTION: '?'
      SEMICOLON: ;
      COLON: ':'
      COMMA: ','
      PERIOD: .
      LESS_THAN: <
      GREATER_THAN: '>'
      APOSTROPHE: "'"
      QUOTE: '"'
      LBKT: '['
      RBKT: ']'

      # 功能键 (使用 Material Design 图标)
      ESCAPE: $$mdi:keyboard-esc$$
      TAB: $$mdi:keyboard-tab$$
      SPACE: $$mdi:keyboard-space$$
      BACKSPACE: $$mdi:backspace$$
      ENTER: $$mdi:keyboard-return$$
      DELETE: Del
      PAGE_UP: $$mdi:transfer-up$$
      PAGE_DOWN: $$mdi:transfer-down$$

      # 修饰键 (使用 Apple 风格图标)
      LEFT_SHIFT: $$mdi:apple-keyboard-shift$$
      RIGHT_SHIFT: $$mdi:apple-keyboard-shift$$
      LEFT_CTRL: $$mdi:apple-keyboard-control$$
      RIGHT_CTRL: $$mdi:apple-keyboard-control$$
      LEFT_ALT: $$mdi:apple-keyboard-option$$
      RIGHT_ALT: $$mdi:apple-keyboard-option$$
      LEFT_GUI: $$mdi:apple-keyboard-command$$
      RIGHT_GUI: $$mdi:apple-keyboard-command$$

      # 方向键 (使用箭头图标)
      UP: $$mdi:arrow-up-bold$$
      DOWN: $$mdi:arrow-down-bold$$
      LEFT: $$mdi:arrow-left-bold$$
      RIGHT: $$mdi:arrow-right-bold$$

      # 快捷键别名
      ESC: $$mdi:keyboard-esc$$
      RET: $$mdi:keyboard-return$$
      BSPC: $$mdi:backspace$$
      LCTRL: $$mdi:apple-keyboard-control$$
      LSHIFT: $$mdi:apple-keyboard-shift$$
      LALT: $$mdi:apple-keyboard-option$$
      LCMD: $$mdi:apple-keyboard-command$$
      RCTRL: $$mdi:apple-keyboard-control$$
      RSHIFT: $$mdi:apple-keyboard-shift$$
      RALT: $$mdi:apple-keyboard-option$$
      RCMD: $$mdi:apple-keyboard-command$$
      PG_UP: $$mdi:transfer-up$$
      PG_DN: $$mdi:transfer-down$$
      BT_CLR: $$mdi:bluetooth-off$$
      BT_SEL: $$mdi:bluetooth-connect$$
