# keymap_drawer.config.yaml
# 为 Charybdis 4x6 分体键盘生成美观键位图
draw_config:
  # 布局定义
  layout:
    ortho_layout:
      split: true
      rows: 4
      columns: 6
      thumbs: 5

  # 基础显示设置
  append_colon_to_layer_header: false
  draw_key_sides: true

  # 自定义样式（参考库同款）
  svg_extra_style: |
    svg.keymap {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: bold;
    }
    text.label {
      stroke: #dfdfde;
      stroke-width: 12;
      stroke-linejoin: round;
    }
    rect.combo, rect.combo-separate {
      opacity: 0.95;
      stroke: #c9cccf;
      stroke-width: 0.5;
      fill: #d7eaed;
    }
    path.combo {
      stroke-dasharray: 4, 4;
      stroke-opacity: 0.3;
    }
    rect.held, rect.combo.held {
      fill: #ebdada;
    }
    .trans.tap, .ghost.tap {
      opacity: 0.5;
    }
    .shifted {
      translate: -9px 3px;
      opacity: 0.3;
    }
    .toggle.shifted {
      translate: -12px 17px;
      opacity: 1.0;
    }
    .toggle.hold {
      translate: 12px -25px;
    }
    .text_with_symbol.tap {
      translate: -1px 1px;
    }
    .text_with_symbol.shifted {
      translate: 8px 13px;
      font-size: 8px;
      opacity: 1.0;
    }
    .combo.text_with_symbol.tap {
      translate: -1px 1px;
    }
    .combo.text_with_symbol.shifted {
      translate: 7px 5px;
      font-size: 8px;
      opacity: 1.0;
    }

  # 解析配置（美化的核心）
  parse_config:
    preprocess: true
    skip_binding_parsing: false

    # 自定义行为映射
    raw_binding_map:
      "&none":
        tap: $$mdi:minus-circle-outline$$
        type: none
      "&bt BT_SEL 0":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 1
      "&bt BT_SEL 1":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 2
      "&bt BT_SEL 2":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 3
      "&bt BT_SEL 3":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 4
      "&bt BT_SEL 4":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 5
      "&bt BT_SEL 5":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 6
      "&mkp LCLK":
        tap: $$mdi:mouse-left-click$$
        hold: "left"
      "&mkp MCLK":
        tap: $$mdi:mouse$$
        hold: "middle"
      "&mkp RCLK":
        tap: $$mdi:mouse-right-click$$
        hold: "right"
      "&bootloader":
        tap: $$mdi:gesture-tap-hold$$
      "&bt BT_CLR":
        tap: "CLR"
        hold: "CLR"
      # 层切换键显示为红色 L1, L2 等
      "&mo 1":
        tap: "L1"
        hold: "L1"
        type: held
      "&mo 2":
        tap: "L2"
        hold: "L2"
        type: held
      "&mo 3":
        tap: "L3"
        hold: "L3"
        type: held
      "&mo 4":
        tap: "L4"
        hold: "L4"
        type: held
      "&lt 1 ENTER":
        tap: "Enter"
        hold: "L1"
        type: held
      "&lt 2 ENTER":
        tap: "Enter"
        hold: "L2"
        type: held
      "&lt 3 Z":
        tap: "Z"
        hold: "L3"
        type: held
      "&lt 3 SLASH":
        tap: "/"
        hold: "L3"
        type: held

    # 图例设置
    mark_alternate_layer_activators: false
    sticky_label: $$mdi:gesture-tap-hold$$
    toggle_label: toggle
    tap_toggle_label: tap-toggle
    trans_legend:
      tap: $$mdi:transfer$$
      type: trans

    # 组合键显示规则
    modifier_fn_map:
      left_ctrl: Ctl
      right_ctrl: Ctl
      left_shift: $$mdi:apple-keyboard-shift$$
      right_shift: $$mdi:apple-keyboard-shift$$
      left_alt: Alt
      right_alt: AltGr
      left_gui: Gui
      right_gui: Gui
      keycode_combiner: '{mods}+{key}'
      mod_combiner: '{mod_1}+{mod_2}'

    # 键码 → 图标/短名称映射（彻底美化）
    zmk_keycode_map:
      # 常用符号
      EXCLAMATION: '!'
      AT_SIGN: '@'
      HASH: '#'
      DOLLAR: $
      PERCENT: '%'
      CARET: ^
      AMPERSAND: '&'
      ASTERISK: '*'
      LEFT_PARENTHESIS: (
      RIGHT_PARENTHESIS: )
      MINUS: '-'
      EQUAL: '='
      UNDERSCORE: _
      GRAVE: '`'
      TILDE: '~'
      PIPE: '|'
      SLASH: /
      BACKSLASH: \
      QUESTION: '?'
      SEMICOLON: ;
      COLON: ':'
      COMMA: ','
      PERIOD: .
      LESS_THAN: <
      GREATER_THAN: '>'
      APOSTROPHE: "'"
      QUOTE: '"'
      LBKT: '['
      RBKT: ']'

      # 数字（确保纯数字显示）
      N1: '1'
      N2: '2'
      N3: '3'
      N4: '4'
      N5: '5'
      N6: '6'
      N7: '7'
      N8: '8'
      N9: '9'
      N0: '0'
      NUMBER_1: '1'
      NUMBER_2: '2'
      NUMBER_3: '3'
      NUMBER_4: '4'
      NUMBER_5: '5'
      NUMBER_6: '6'
      NUMBER_7: '7'
      NUMBER_8: '8'
      NUMBER_9: '9'
      NUMBER_0: '0'

      # 功能键 (图标化)
      ESCAPE: $$mdi:keyboard-esc$$
      ESC: $$mdi:keyboard-esc$$
      TAB: $$mdi:keyboard-tab$$
      SPACE: $$mdi:keyboard-space$$
      BACKSPACE: $$mdi:backspace$$
      BSPC: $$mdi:backspace$$
      ENTER: $$mdi:keyboard-return$$
      RET: $$mdi:keyboard-return$$
      DELETE: Del
      DEL: Del
      PAGE_UP: $$mdi:transfer-up$$
      PG_UP: $$mdi:transfer-up$$
      PAGE_DOWN: $$mdi:transfer-down$$
      PG_DN: $$mdi:transfer-down$$
      CAPSLOCK: Caps
      CAPITAL: Caps

      # 修饰键 (Apple 风格图标)
      LEFT_SHIFT: $$mdi:apple-keyboard-shift$$
      LSHIFT: $$mdi:apple-keyboard-shift$$
      RIGHT_SHIFT: $$mdi:apple-keyboard-shift$$
      RSHIFT: $$mdi:apple-keyboard-shift$$
      LEFT_CTRL: $$mdi:apple-keyboard-control$$
      LCTRL: $$mdi:apple-keyboard-control$$
      RIGHT_CTRL: $$mdi:apple-keyboard-control$$
      RCTRL: $$mdi:apple-keyboard-control$$
      LEFT_ALT: $$mdi:apple-keyboard-option$$
      LALT: $$mdi:apple-keyboard-option$$
      RIGHT_ALT: $$mdi:apple-keyboard-option$$
      RALT: $$mdi:apple-keyboard-option$$
      LEFT_GUI: $$mdi:apple-keyboard-command$$
      LGUI: $$mdi:apple-keyboard-command$$
      RIGHT_GUI: $$mdi:apple-keyboard-command$$
      RGUI: $$mdi:apple-keyboard-command$$
      LEFT_WIN: $$mdi:apple-keyboard-command$$
      RIGHT_WIN: $$mdi:apple-keyboard-command$$

      # 方向键 (箭头图标)
      UP: $$mdi:arrow-up-bold$$
      DOWN: $$mdi:arrow-down-bold$$
      LEFT: $$mdi:arrow-left-bold$$
      RIGHT: $$mdi:arrow-right-bold$$

      # F键
      F1: F1
      F2: F2
      F3: F3
      F4: F4
      F5: F5
      F6: F6
      F7: F7
      F8: F8
      F9: F9
      F10: F10
      F11: F11
      F12: F12
