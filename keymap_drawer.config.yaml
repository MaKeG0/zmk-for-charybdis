draw_config:
  layout:
    ortho_layout:
      split: true
      rows: 4
      columns: 6
      thumbs: 5
  append_colon_to_layer_header: false
  draw_key_sides: true
  svg_extra_style: |
    svg.keymap {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: bold;
    }
    text.label {
      stroke: #dfdfde;
      stroke-width: 12;
      stroke-linejoin: round;
    }
    rect.held {
      fill: #ebdada;
    }
