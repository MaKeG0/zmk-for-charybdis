# keymap_drawer.config.yaml
draw_config:
  
  key_w: 60.0
  key_h: 56.0
  split_gap: 30.0
  combo_side_ratio: 0.4

  
  font_size: 14
  font_family: "JetBrains Mono, Inter, system-ui, sans-serif"
  
  
  style_css: |
    svg { background: #1a1b26; color: #a9b1d6; }
    rect.key { fill: #24283b; stroke: #414868; stroke-width: 1.5; rx: 6; ry: 6; }
    rect.hold { fill: #2ac3de; }
    text { fill: #c0caf5; font-weight: 500; }
    text.hold { fill: #1a1b26; font-weight: bold; font-size: 11px; }
    text.shifted { fill: #7aa2f7; font-size: 11px; }
    text.accent { fill: #bb9af7; font-weight: bold; }
    path.combo { stroke: #ff9e64; stroke-width: 2; fill: none; stroke-linecap: round; }
    text.combo { fill: #ff9e64; font-size: 11px; }
    rect.layer-label { fill: #414868; rx: 4; ry: 4; }
    text.layer-label { fill: #7ccdfd; font-weight: bold; }

