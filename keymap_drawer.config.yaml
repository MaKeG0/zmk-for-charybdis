draw_config:
  # 布局（Charybdis 4x6 分体）
  layout:
    ortho_layout:
      split: true
      rows: 4
      columns: 6
      thumbs: 5

  # 基础显示设置
  append_colon_to_layer_header: false
  draw_key_sides: true

  # 自定义样式（放大字体 + 美观配色）
  svg_extra_style: |
    svg.keymap {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: bold;
    }
    text.label {
      stroke: #dfdfde;
      stroke-width: 12;
      stroke-linejoin: round;
    }
    rect.combo, rect.combo-separate {
      opacity: 0.95;
      stroke: #c9cccf;
      stroke-width: 0.5;
      fill: #d7eaed;
    }
    path.combo {
      stroke-dasharray: 4, 4;
      stroke-opacity: 0.3;
    }
    rect.held, rect.combo.held {
      fill: #ebdada;
    }

  # 按键解析与美化
  parse_config:
    preprocess: false

    # 特殊行为映射（仅保留常用）
    raw_binding_map:
      "&none":
        tap: $$mdi:minus-circle-outline$$
        type: none
      "&bootloader":
        tap: $$mdi:gesture-tap-hold$$
      "&mkp LCLK":
        tap: $$mdi:mouse-left-click$$
        hold: "left"
      "&mkp MCLK":
        tap: $$mdi:mouse$$
        hold: "middle"
      "&mkp RCLK":
        tap: $$mdi:mouse-right-click$$
        hold: "right"

    # 组合键修饰符显示
    modifier_fn_map:
      left_ctrl: Ctl
      right_ctrl: Ctl
      left_shift: $$mdi:apple-keyboard-shift$$
      right_shift: $$mdi:apple-keyboard-shift$$
      left_alt: Alt
      right_alt: AltGr
      left_gui: Gui
      right_gui: Gui
      keycode_combiner: '{mods}+{key}'
      mod_combiner: '{mod_1}+{mod_2}'

    # 全面键码缩写映射（覆盖常用 ZMK 键码）
    zmk_keycode_map:
      # 符号键（保持不变）
      EXCLAMATION: '!'
      EXCL: '!'
      AT_SIGN: '@'
      AT: '@'
      HASH: '#'
      POUND: '#'
      DOLLAR: $
      DLLR: $
      PERCENT: '%'
      PRCNT: '%'
      CARET: ^
      AMPERSAND: '&'
      AMPS: '&'
      ASTERISK: '*'
      ASTRK: '*'
      STAR: '*'
      LEFT_PARENTHESIS: (
      LPAR: (
      RIGHT_PARENTHESIS: )
      RET: )
      MINUS: '-'
      EQUAL: '='
      PLUS: '+'
      UNDERSCORE: _
      GRAVE: '`'
      TILDE: '~'
      PIPE: '|'
      SLASH: /
      QUESTION: '?'
      BACKSLASH: \
      SEMICOLON: ';'
      COLON: ':'
      COMMA: ','
      PERIOD: .
      LESS_THAN: '<'
      GREATER_THAN: '>'

      # 常用功能键（已缩写）
      ESCAPE: Esc
      CAPSLOCK: Caps
      CAPITAL: Caps
      TAB: Tab
      BACKSPACE: Bksp
      BSPC: Bksp
      SPACE: Spc
      ENTER: Enter
      DELETE: Del
      DEL: Del
      PAGE_UP: PgUp
      PG_UP: PgUp
      PAGE_DOWN: PgDn
      PG_DN: PgDn
      HOME: Home
      END: End
      INSERT: Ins
      INS: Ins
      PRINTSCREEN: PrtSc
      PSCR: PrtSc
      SCROLLLOCK: ScrlLk
      SLCK: ScrlLk
      PAUSE_BREAK: Pause
      PAUSE: Pause
      MENU: Menu
      APP: Menu

      # 修饰键（缩写更短）
      LEFT_SHIFT: LShft
      LSHIFT: LShft
      RIGHT_SHIFT: RShft
      RSHIFT: RShft
      LEFT_CTRL: LCtl
      LCTRL: LCtl
      RIGHT_CTRL: RCtl
      RCTRL: RCtl
      LEFT_ALT: LAlt
      LALT: LAlt
      RIGHT_ALT: RAlt
      RALT: RAlt
      LEFT_GUI: LGui
      LGUI: LGui
      RIGHT_GUI: RGui
      RGUI: RGui

      # 方向键（箭头符号直观）
      UP: '↑'
      DOWN: '↓'
      LEFT: '←'
      RIGHT: '→'

      # 媒体键（简短名称）
      C_MUTE: Mute
      MUTE: Mute
      C_VOL_UP: Vol+
      VOL_UP: Vol+
      C_VOL_DN: Vol-
      VOL_DN: Vol-
      C_MEDIA_PLAY_PAUSE: Play
      PLAY_PAUSE: Play
      C_MEDIA_NEXT_TRACK: Next
      NEXT: Next
      C_MEDIA_PREV_TRACK: Prev
      PREVIOUS: Prev
      C_MEDIA_STOP: Stop
      STOP: Stop
      C_MEDIA_EJECT: Eject
      EJECT: Eject
      C_BRIGHTNESS_INC: Brt+
      BRIGHTNESS_INC: Brt+
      C_BRIGHTNESS_DEC: Brt-
      BRIGHTNESS_DEC: Brt-

      # 其他系统键
      NUM_LOCK: NumLk
      NUMLOCK: NumLk
      POWER: Power
      SLEEP: Sleep
      WAKE: Wake

    # 层切换标记
    mark_alternate_layer_activators: true
