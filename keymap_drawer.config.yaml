draw_config:
  layout:
    ortho_layout:
      split: true
      rows: 4
      columns: 6
      thumbs: 5

  append_colon_to_layer_header: false
  draw_key_sides: true

  svg_extra_style: |
    svg.keymap {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: bold;
    }
    text.label {
      stroke: #dfdfde;
      stroke-width: 12;
      stroke-linejoin: round;
    }
    rect.combo, rect.combo-separate {
      opacity: 0.95;
      stroke: #c9cccf;
      stroke-width: 0.5;
      fill: #d7eaed;
    }
    path.combo {
      stroke-dasharray: 4, 4;
      stroke-opacity: 0.3;
    }
    rect.held, rect.combo.held {
      fill: #ebdada;
    }

  parse_config:
    preprocess: true
    skip_binding_parsing: false

    raw_binding_map:
      "&none":
        tap: $$mdi:minus-circle-outline$$
        type: none
      "&bt BT_SEL 0":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 1
      "&bt BT_SEL 1":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 2
      "&bt BT_SEL 2":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 3
      "&bt BT_CLR":
        tap: $$mdi:bluetooth-off$$
      "&mkp LCLK":
        tap: $$mdi:mouse-left-click$$
        hold: "left"
      "&mkp MCLK":
        tap: $$mdi:mouse$$
        hold: "middle"
      "&mkp RCLK":
        tap: $$mdi:mouse-right-click$$
        hold: "right"
      "&bootloader":
        tap: $$mdi:gesture-tap-hold$$

    modifier_fn_map:
      left_ctrl: Ctl
      right_ctrl: Ctl
      left_shift: $$mdi:apple-keyboard-shift$$
      right_shift: $$mdi:apple-keyboard-shift$$
      left_alt: Alt
      right_alt: AltGr
      left_gui: Gui
      right_gui: Gui
      keycode_combiner: '{mods}+{key}'
      mod_combiner: '{mod_1}+{mod_2}'

    zmk_keycode_map:
      BACKSPACE: "Bksp"   # 原来是 $$mdi:backspace$$
      ESCAPE: "Esc"
      EXCLAMATION: '!'
      AT_SIGN: '@'
      HASH: '#'
      DOLLAR: $
      PERCENT: '%'
      CARET: ^
      AMPERSAND: '&'
      ASTERISK: '*'
      LEFT_PARENTHESIS: (
      RIGHT_PARENTHESIS: )
      MINUS: '-'
      EQUAL: '='
      UNDERSCORE: _
      GRAVE: '`'
      TILDE: '~'
      PIPE: '|'
      SLASH: /
      BACKSLASH: \
      QUESTION: '?'
      SEMICOLON: ;
      COLON: ':'
      COMMA: ','
      PERIOD: .
      LESS_THAN: <
      GREATER_THAN: '>'
      APOSTROPHE: "'"
      QUOTE: '"'
      LBKT: '['
      RBKT: ']'
      ESCAPE: $$mdi:keyboard-esc$$
      ESC: $$mdi:keyboard-esc$$
      TAB: $$mdi:keyboard-tab$$
      BACKSPACE: $$mdi:backspace$$
      BSPC: $$mdi:backspace$$
      SPACE: $$mdi:keyboard-space$$
      ENTER: $$mdi:keyboard-return$$
