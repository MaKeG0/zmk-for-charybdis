draw_config:
  # 布局
  layout:
    ortho_layout:
      split: true
      rows: 4
      columns: 6
      thumbs: 5

  # 显示基础设置
  append_colon_to_layer_header: false
  draw_key_sides: true

  # 样式（字体 12px，加粗，柔和配色）
  svg_extra_style: |
    svg.keymap {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: bold;
    }
    text.label {
      stroke: #dfdfde;
      stroke-width: 12;
      stroke-linejoin: round;
    }
    rect.combo, rect.combo-separate {
      opacity: 0.95;
      stroke: #c9cccf;
      stroke-width: 0.5;
      fill: #d7eaed;
    }
    path.combo {
      stroke-dasharray: 4, 4;
      stroke-opacity: 0.3;
    }
    rect.held, rect.combo.held {
      fill: #ebdada;
    }

  parse_config:
    preprocess: false

    # 自定义所有特殊绑定的显示（关键）
    raw_binding_map:
      "&none":
        tap: $$mdi:minus-circle-outline$$
        type: none
      "&bootloader":
        tap: $$mdi:gesture-tap-hold$$
      "&mkp LCLK":
        tap: $$mdi:mouse-left-click$$
        hold: "left"
      "&mkp MCLK":
        tap: $$mdi:mouse$$
        hold: "middle"
      "&mkp RCLK":
        tap: $$mdi:mouse-right-click$$
        hold: "right"
      # 蓝牙切换（你鼠标层用到了）
      "&bt BT_SEL 0":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 1
      "&bt BT_SEL 1":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 2
      "&bt BT_SEL 2":
        shifted: $$mdi:bluetooth-connect$$
        tap: ""
        hold: 3
      "&bt BT_CLR":
        tap: "CLR"
        hold: "CLR"
      # 层瞬间切换 &mo
      "&mo 1":
        tap: "L1"
        hold: "L1"
        type: held          # 红色背景，与普通键区分
      "&mo 2":
        tap: "L2"
        hold: "L2"
        type: held
      "&mo 3":
        tap: "L3"
        hold: "L3"
        type: held
      "&mo 4":
        tap: "L4"
        hold: "L4"
        type: held
      # 层切换+按键 &lt
      "&lt 1 ENTER":
        tap: "Enter"
        hold: "L1"
        type: held
      "&lt 2 ENTER":
        tap: "Enter"
        hold: "L2"
        type: held
      "&lt 3 Z":
        tap: "Z"
        hold: "L3"
        type: held
      "&lt 3 SLASH":
        tap: "/"
        hold: "L3"
        type: held

    # 关闭自动层标记（我们已经手动处理了）
    mark_alternate_layer_activators: false

    # 组合键显示规则
    modifier_fn_map:
      left_ctrl: Ctl
      right_ctrl: Ctl
      left_shift: $$mdi:apple-keyboard-shift$$
      right_shift: $$mdi:apple-keyboard-shift$$
      left_alt: Alt
      right_alt: AltGr
      left_gui: Gui
      right_gui: Gui
      keycode_combiner: '{mods}+{key}'
      mod_combiner: '{mod_1}+{mod_2}'

    # 键码 → 短名称/符号（全覆盖）
    zmk_keycode_map:
      # 符号
      GRAVE: '`'
      TILDE: '~'
      EXCLAMATION: '!'
      EXCL: '!'
      AT_SIGN: '@'
      AT: '@'
      HASH: '#'
      POUND: '#'
      DOLLAR: $
      DLLR: $
      PERCENT: '%'
      PRCNT: '%'
      CARET: ^
      AMPERSAND: '&'
      AMPS: '&'
      ASTERISK: '*'
      ASTRK: '*'
      STAR: '*'
      LEFT_PARENTHESIS: (
      LPAR: (
      RIGHT_PARENTHESIS: )
      RET: )
      MINUS: '-'
      EQUAL: '='
      PLUS: '+'
      UNDERSCORE: _
      PIPE: '|'
      SLASH: /
      BACKSLASH: \
      QUESTION: '?'
      SEMICOLON: ';'
      COLON: ':'
      COMMA: ','
      PERIOD: .
      LESS_THAN: '<'
      GREATER_THAN: '>'
      APOSTROPHE: "'"
      APOS: "'"
      QUOTE: '"'
      DQUO: '"'
      LBKT: '['
      RBKT: ']'
      # 数字 N1~N0 (确保显示为纯数字，无下划线)
      NUMBER_1: '1'
      N1: '1'
      NUMBER_2: '2'
      N2: '2'
      NUMBER_3: '3'
      N3: '3'
      NUMBER_4: '4'
      N4: '4'
      NUMBER_5: '5'
      N5: '5'
      NUMBER_6: '6'
      N6: '6'
      NUMBER_7: '7'
      N7: '7'
      NUMBER_8: '8'
      N8: '8'
      NUMBER_9: '9'
      N9: '9'
      NUMBER_0: '0'
      N0: '0'
      # 功能键
      ESCAPE: Esc
      ESC: Esc
      CAPSLOCK: Caps
      CAPITAL: Caps
      TAB: Tab
      BACKSPACE: Bksp
      BSPC: Bksp
      SPACE: Spc
      SPC: Spc
      ENTER: Enter
      RET: Enter
      DELETE: Del
      DEL: Del
      PAGE_UP: PgUp
      PG_UP: PgUp
      PAGE_DOWN: PgDn
      PG_DN: PgDn
      HOME: Home
      END: End
      INSERT: Ins
      INS: Ins
      PRINTSCREEN: PrtSc
      PSCR: PrtSc
      SCROLLLOCK: ScrlLk
      SLCK: ScrlLk
      PAUSE_BREAK: Pause
      PAUSE: Pause
      MENU: Menu
      APP: Menu
      # 修饰键（缩写）
      LEFT_SHIFT: LShft
      LSHIFT: LShft
      RIGHT_SHIFT: RShft
      RSHIFT: RShft
      LEFT_CTRL: LCtl
      LCTRL: LCtl
      RIGHT_CTRL: RCtl
      RCTRL: RCtl
      LEFT_ALT: LAlt
      LALT: LAlt
      RIGHT_ALT: RAlt
      RALT: RAlt
      LEFT_GUI: LGui
      LGUI: LGui
      RIGHT_GUI: RGui
      RGUI: RGui
      LEFT_WIN: LGui
      RIGHT_WIN: RGui
      # 方向键（箭头）
      UP: '↑'
      DOWN: '↓'
      LEFT: '←'
      RIGHT: '→'
      # 媒体键
      C_MUTE: Mute
      MUTE: Mute
      C_VOL_UP: Vol+
      VOL_UP: Vol+
      C_VOL_DN: Vol-
      VOL_DN: Vol-
      C_MEDIA_PLAY_PAUSE: Play
      PLAY_PAUSE: Play
      C_MEDIA_NEXT_TRACK: Next
      NEXT: Next
      C_MEDIA_PREV_TRACK: Prev
      PREVIOUS: Prev
      C_MEDIA_STOP: Stop
      STOP: Stop
      # 系统键
      NUM_LOCK: NumLk
      NUMLOCK: NumLk
      POWER: Power
      SLEEP: Sleep
      WAKE: Wake
      # F1-F12 (可选)
      F1: F1
      F2: F2
      F3: F3
      F4: F4
      F5: F5
      F6: F6
      F7: F7
      F8: F8
      F9: F9
      F10: F10
      F11: F11
      F12: F12
